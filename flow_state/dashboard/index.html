<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow State — Dashboard</title>
    <meta name="description" content="AI-powered focus monitoring dashboard. Stay in the zone.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- Ambient background glow -->
    <div class="ambient-glow" id="ambient-glow"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-icon-wrap">
                        <svg class="sidebar-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="9" stroke-width="1.5"/>
                            <circle cx="12" cy="12" r="3" fill="currentColor"/>
                        </svg>
                    </div>
                    <span class="sidebar-brand-text">Flow State</span>
                </div>
            </div>
            <div class="sidebar-content" id="sidebar-content">
                <div class="loader">
                    <div class="loader-spinner"></div>
                    <div class="loader-text">Loading sessions…</div>
                </div>
            </div>
        </aside>

        <!-- Sidebar Toggle -->
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
            <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
        </button>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <div class="container">
                <!-- Header -->
                <header class="header">
                    <div class="header-left">
                        <h1 class="header-title">Overview</h1>
                        <p class="header-subtitle">Real-time focus monitoring</p>
                    </div>
                    <div class="header-actions">
                        <!-- Neumorphic Toggle Switch -->
                        <div class="theme-toggle-wrap" onclick="toggleTheme()" role="button" aria-label="Toggle light/dark mode" tabindex="0">
                            <div class="theme-toggle-track" id="theme-toggle-track">
                                <div class="theme-toggle-thumb" id="theme-toggle-thumb">
                                    <!-- Sun icon (light mode) -->
                                    <svg class="toggle-sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="5"/>
                                        <line x1="12" y1="1" x2="12" y2="3"/>
                                        <line x1="12" y1="21" x2="12" y2="23"/>
                                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                                        <line x1="1" y1="12" x2="3" y2="12"/>
                                        <line x1="21" y1="12" x2="23" y2="12"/>
                                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                                    </svg>
                                    <!-- Moon icon (dark mode) -->
                                    <svg class="toggle-moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                                    </svg>
                                </div>
                                <!-- Track background icons -->
                                <svg class="track-sun-bg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                                    <circle cx="12" cy="12" r="5"/>
                                    <line x1="12" y1="1" x2="12" y2="3"/>
                                    <line x1="12" y1="21" x2="12" y2="23"/>
                                </svg>
                                <svg class="track-moon-bg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                </header>

                <div id="dashboard">
                    <div class="loader">
                        <div class="loader-spinner"></div>
                        <div class="loader-text">Loading stats…</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Floating Refresh Button -->
    <button class="refresh-fab" onclick="loadDashboard()" title="Refresh" aria-label="Refresh dashboard">
        <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
        </svg>
    </button>

    <script src="dashboard.js"></script>
</body>
</html>
